# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Springdoc ? deshabilitado en prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

logging.level.org.springframework.security=DEBUG

# WhatsApp
whatsapp.api.token=${WHATSAPP_API_TOKEN}
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.api.version=v18.0
whatsapp.templates.status-change=order_status_change
whatsapp.templates.new-order-admin=new_order_admin
whatsapp.templates.manual-text=manual_notification
whatsapp.templates.manual-image=manual_notification_image
whatsapp.admin.phone=${ADMIN_PHONE}
whatsapp.retry.enabled=true
whatsapp.retry.delay-ms=300000

#Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM}
twilio.admin.phone=${ADMIN_PHONE}